name: Build Firmware

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize submodules
        run: |
          git submodule update --init lib/pico-sdk lib/pico-ssd1306
          git -C lib/pico-sdk submodule update --init lib/tinyusb

      - name: Install ARM toolchain and build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            gcc-arm-none-eabi \
            libnewlib-arm-none-eabi \
            libstdc++-arm-none-eabi-newlib \
            build-essential

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Configure CMake
        env:
          PICO_SDK_PATH: ${{ github.workspace }}/lib/pico-sdk
        run: cmake -B build -S .

      - name: Build
        run: cmake --build build --parallel

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: woyta-pad-firmware
          path: build/*.uf2
